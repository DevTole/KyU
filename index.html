<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KyU App Downloads</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #14141c;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            max-width: 480px;
            width: 100%;
            border: 1px solid #2a2a3a;
        }
        .icon {
            width: 48px;
            height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #1e1e2e;
            border-radius: 12px;
            margin-bottom: 16px;
            color: #64ffda;
            font-size: 24px;
        }
        h1 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: #8888a0;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .download-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 24px;
            background: #1e1e2e;
            color: #ffffff;
            text-decoration: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s ease;
            border: 1px solid #2a2a3a;
        }
        .download-btn:hover {
            background: #2a2a3e;
            border-color: #64ffda;
            transform: translateY(-2px);
        }
        .download-btn .arch {
            font-size: 12px;
            font-weight: 400;
            color: #8888a0;
            margin-left: 4px;
        }
        .download-btn ion-icon {
            font-size: 20px;
            color: #64ffda;
            flex-shrink: 0;
        }
        .download-btn.armv7 ion-icon {
            color: #ffd700;
        }
        .info {
            color: #666680;
            font-size: 13px;
            margin-top: 24px;
            padding: 14px;
            background: #0e0e16;
            border-radius: 8px;
            border: 1px solid #1a1a2a;
        }
        .info strong {
            color: #64ffda;
            font-weight: 500;
        }
        .footer {
            margin-top: 16px;
            color: #44445a;
            font-size: 12px;
        }
        .badge {
            display: inline-block;
            background: #1a1a2a;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 11px;
            color: #64ffda;
            margin-left: 8px;
        }
        @media (max-width: 480px) {
            .container {
                padding: 24px;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <ion-icon name="phone-portrait-outline"></ion-icon>
        </div>
        <h1>KyU</h1>
        <p class="subtitle">Android Application</p>

        <div class="download-grid">
            <a href="https://github.com/DevTole/KyU/raw/main/app-arm64-v8a-release.apk" 
               class="download-btn" 
               download>
                <ion-icon name="arrow-down-circle-outline"></ion-icon>
                ARM64
                <span class="arch">64-bit</span>
                <span class="badge">Recommended</span>
            </a>

            <a href="https://github.com/DevTole/KyU/raw/main/app-armeabi-v7a-release.apk" 
               class="download-btn armv7" 
               download>
                <ion-icon name="arrow-down-circle-outline"></ion-icon>
                ARMv7
                <span class="arch">32-bit</span>
            </a>
        </div>

        <div class="info">
            <strong>ARM64</strong> is recommended for modern devices including Samsung A06.
        </div>
        <div class="footer">
            Version 1.0.0
        </div>
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
